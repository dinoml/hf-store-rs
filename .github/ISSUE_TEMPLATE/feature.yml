name: Feature proposal
description: Propose a bounded Hub or cache capability.
title: "Proposal: "
labels:
  - enhancement
body:
  - type: textarea
    id: outcome
    attributes:
      label: Outcome
      description: What observable user outcome should become possible?
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: Explain why this belongs in the reusable Hub storage boundary.
    validations:
      required: true
  - type: textarea
    id: contract
    attributes:
      label: Proposed contract
      description: Include errors, cancellation, offline, and progress semantics where relevant.
  - type: textarea
    id: compatibility
    attributes:
      label: Cache and platform impact
      description: Note on-disk compatibility, migration, Windows, locking, and GC consequences.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
