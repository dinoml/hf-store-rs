name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal --component clippy,rustfmt

      - name: Check formatting
        run: cargo +stable fmt --all --check

      - name: Run Clippy
        run: cargo +stable clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo +stable doc --workspace --all-features --no-deps --locked

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal

      - name: Run tests
        run: cargo +stable test --workspace --all-features --locked

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust 1.85
        run: rustup toolchain install 1.85.0 --profile minimal

      - name: Check workspace
        run: cargo +1.85.0 check --workspace --all-targets --all-features --locked

      - name: Run tests
        run: cargo +1.85.0 test --workspace --all-features --locked
